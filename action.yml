name: Substitute File Hashes
description: Replaces file hash placeholders with actual file hashes in files matching a glob pattern
author: Andrei Izotov
inputs:
  files:
    required: true
    description: Glob pattern for files to process (e.g., '**/*.yaml')
  algorithm:
    required: false
    default: sha256
    description: Hashing algorithm from Node.js crypto API (e.g., sha256, md5)
  throwIfFileNotExists:
    required: false
    default: "true"
    description: Fail action when resolved hashFile path is missing or outside workspace
runs:
  using: node24
  main: dist/index.cjs
branding:
  icon: hash
  color: white
